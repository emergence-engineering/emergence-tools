name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm lint

      - run: pnpm --filter prosemirror-image-plugin exec playwright install --with-deps chromium

      - run: pnpm test --filter='!prosemirror-image-plugin'

      - run: pnpm --filter prosemirror-image-plugin test -- --project=chromium

      - run: pnpm typecheck

  deploy-playground:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm --filter playground-fe build
        env:
          VITE_API_URL: https://emergence-tools-backend.fly.dev
          VITE_WS_URL: wss://emergence-tools-backend.fly.dev/hocuspocus

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: playground/fe/dist

      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-backend:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@1

      - run: flyctl deploy --remote-only
        working-directory: playground/be
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}